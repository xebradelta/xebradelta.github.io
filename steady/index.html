<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>STEADY — 30 Days of Balance &amp; Stillness</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Unbounded:wght@200;400;700&display=swap" rel="stylesheet" />
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --ink:#0e0e0e; --paper:#f2ede6; --accent:#c94f1e; --muted:#8a8278; --rule:#d4cdc5;
    --mono:'DM Mono',ui-monospace,Menlo,monospace; --display:'Unbounded',system-ui,sans-serif;
  }
  html,body{height:100%}
  body{background:var(--paper);color:var(--ink);font-family:var(--mono);line-height:1.55;-webkit-font-smoothing:antialiased}
  .app{max-width:560px;margin:0 auto;min-height:100%;padding:1.5rem 1.25rem 3rem;display:flex;flex-direction:column}
  .view{display:none;flex:1}
  .view.active{display:block}
  /* header */
  .top{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:1.5rem}
  .brand{font-family:var(--display);font-weight:700;font-size:2rem;letter-spacing:-.04em;line-height:.9}
  .brand span{color:var(--accent)}
  .brand small{display:block;font-family:var(--mono);font-weight:400;font-size:.56rem;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);margin-top:.5rem}
  /* stats */
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--rule);border:1px solid var(--rule);margin-bottom:1.25rem}
  .stat{background:var(--paper);padding:.85rem .75rem;text-align:center}
  .stat .v{font-family:var(--display);font-weight:700;font-size:1.5rem;letter-spacing:-.03em;line-height:1}
  .stat .v small{font-size:.8rem;color:var(--muted)}
  .stat .l{font-size:.52rem;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-top:.4rem}
  .bar{height:5px;background:var(--rule);margin-bottom:1.5rem;overflow:hidden}
  .bar i{display:block;height:100%;background:var(--accent);width:0;transition:width .5s ease}
  /* today card */
  .today{border:1px solid var(--ink);display:grid;grid-template-columns:auto 1fr;gap:1rem;padding:1.1rem;align-items:center;margin-bottom:1.5rem}
  .today .fig{width:96px;height:106px}
  .today .fig svg{width:100%;height:100%;display:block}
  .today .meta .day{font-size:.56rem;letter-spacing:.2em;text-transform:uppercase;color:var(--accent)}
  .today .meta h2{font-family:var(--display);font-weight:400;font-size:1.25rem;letter-spacing:-.02em;margin:.15rem 0 .4rem}
  .today .meta p{font-size:.74rem;color:#3a3530}
  .cta{display:block;width:100%;font-family:var(--mono);font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;
    background:var(--accent);color:var(--paper);border:none;padding:1rem;cursor:pointer;transition:.15s}
  .cta:hover{background:var(--ink)}
  .cta.ghost{background:var(--paper);color:var(--ink);border:1px solid var(--ink)}
  .cta.ghost:hover{background:var(--ink);color:var(--paper)}
  /* control rows */
  .ctl{margin-bottom:1.25rem}
  .ctl .lab{font-size:.54rem;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);margin-bottom:.55rem}
  .seg{display:flex;flex-wrap:wrap;gap:.4rem}
  .seg button{font-family:var(--mono);font-size:.62rem;letter-spacing:.06em;text-transform:uppercase;
    background:var(--paper);color:var(--ink);border:1px solid var(--rule);padding:.5rem .7rem;cursor:pointer;transition:.15s}
  .seg button:hover{border-color:var(--ink)}
  .seg button.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}
  /* day grid */
  .grid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-bottom:1.5rem}
  .cellday{aspect-ratio:1;border:1px solid var(--rule);background:var(--paper);font-size:.68rem;
    display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.12s;position:relative}
  .cellday:hover{border-color:var(--ink)}
  .cellday.done{background:var(--ink);color:var(--paper);border-color:var(--ink)}
  .cellday.today{border:2px solid var(--accent);color:var(--accent);font-weight:500}
  .cellday.done.today{color:var(--paper)}
  .foot{margin-top:auto;padding-top:1.5rem;font-size:.56rem;letter-spacing:.06em;color:var(--muted);display:flex;justify-content:space-between;align-items:center}
  .foot a{color:var(--muted);cursor:pointer;text-decoration:underline}
  /* session */
  #session{display:none;flex-direction:column;text-align:center}
  #session.active{display:flex}
  .s-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem}
  .s-day{font-size:.56rem;letter-spacing:.2em;text-transform:uppercase;color:var(--accent)}
  .s-exit{font-size:.62rem;color:var(--muted);background:none;border:none;cursor:pointer;letter-spacing:.05em}
  .s-count{font-size:.56rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin:.4rem 0 .1rem}
  .s-name{font-family:var(--display);font-weight:400;font-size:1.5rem;letter-spacing:-.02em;margin:.2rem 0}
  .s-cue{font-size:.76rem;color:#3a3530;min-height:2.6em;max-width:380px;margin:0 auto .5rem}
  .s-stage{width:230px;height:260px;margin:.3rem auto 0}
  .s-stage svg{width:100%;height:100%;display:block}
  .s-stage.flip svg{transform:scaleX(-1)}
  .s-clock{font-family:var(--display);font-weight:700;font-size:4rem;line-height:1;letter-spacing:-.04em;margin-top:.2rem}
  .s-phase{font-size:.7rem;letter-spacing:.22em;text-transform:uppercase;color:var(--accent);min-height:1.2em}
  .s-prog{height:5px;background:var(--rule);max-width:300px;margin:.9rem auto 1.3rem;overflow:hidden}
  .s-prog i{display:block;height:100%;background:var(--accent);width:100%}
  .s-ctrl{display:flex;gap:.6rem;max-width:300px;margin:0 auto;width:100%}
  .s-ctrl-fill{flex:1}
  /* done */
  #done{text-align:center;padding-top:3rem}
  #done .big{font-family:var(--display);font-weight:700;font-size:2.4rem;letter-spacing:-.03em;line-height:1;margin:.5rem 0}
  #done .em{font-size:3rem}
  #done p{font-size:.8rem;color:#3a3530;margin:.6rem auto 2rem;max-width:340px}
</style>
</head>
<body>
<div class="app">

  <!-- ───────── HOME ───────── -->
  <section class="view active" id="home">
    <div class="top">
      <div class="brand">STEA<span>DY</span><small>30 Days of Balance &amp; Stillness</small></div>
    </div>

    <div class="stats">
      <div class="stat"><div class="v" id="stStreak">0</div><div class="l">Day Streak</div></div>
      <div class="stat"><div class="v"><span id="stDone">0</span><small>/30</small></div><div class="l">Days Done</div></div>
      <div class="stat"><div class="v" id="stPct">0<small>%</small></div><div class="l">Complete</div></div>
    </div>
    <div class="bar"><i id="barFill"></i></div>

    <div class="today" id="todayCard"></div>

    <div class="ctl">
      <div class="lab">Intensity</div>
      <div class="seg" id="levelSeg"></div>
    </div>
    <div class="ctl">
      <div class="lab">Figure</div>
      <div class="seg" id="styleSeg"></div>
    </div>

    <div class="ctl">
      <div class="lab">The 30 Days</div>
      <div class="grid" id="dayGrid"></div>
    </div>

    <div class="foot">
      <span>Xebra Delta · made as needed</span>
      <a id="resetLink">Reset progress</a>
    </div>
  </section>

  <!-- ───────── SESSION ───────── -->
  <section class="view" id="session">
    <div class="s-top">
      <div class="s-day" id="sDay">Day 1</div>
      <button class="s-exit" id="sExit">✕ Exit</button>
    </div>
    <div class="s-count" id="sCount"></div>
    <div class="s-name" id="sName">Pose</div>
    <div class="s-cue" id="sCue"></div>
    <div class="s-stage" id="sStage"></div>
    <div class="s-clock" id="sClock">0</div>
    <div class="s-phase" id="sPhase">Get ready</div>
    <div class="s-prog"><i id="sProg"></i></div>
    <div class="s-ctrl">
      <button class="cta ghost s-ctrl-fill" id="sPause">Pause</button>
    </div>
  </section>

  <!-- ───────── DONE ───────── -->
  <section class="view" id="done">
    <div class="em">🎉</div>
    <div class="big" id="dTitle">Day done</div>
    <p id="dMsg"></p>
    <button class="cta" id="dBack">Back to home</button>
  </section>

</div>

<script>
/* ============================================================
   FIGURE RIG + STYLES  (shared with /lab)
   ============================================================ */
const D2R=Math.PI/180;
const seg=(p,L,d)=>({x:p.x+L*Math.sin(d*D2R),y:p.y+L*Math.cos(d*D2R)});
const segUp=(p,L,d)=>({x:p.x+L*Math.sin(d*D2R),y:p.y-L*Math.cos(d*D2R)});
const lerpP=(a,b,t)=>({x:a.x+(b.x-a.x)*t,y:a.y+(b.y-a.y)*t});
const DIM={head:17,neck:12,torso:78,shoulderW:26,hipW:16,upper:42,fore:38,thigh:56,shin:54},HIP={x:150,y:196};
function build(p){const pelvis=HIP,shoulder=segUp(pelvis,DIM.torso,p.lean||0),head=segUp(shoulder,DIM.neck+DIM.head,p.head||0);
 const sL={x:shoulder.x-DIM.shoulderW,y:shoulder.y},sR={x:shoulder.x+DIM.shoulderW,y:shoulder.y};
 const hL={x:pelvis.x-DIM.hipW,y:pelvis.y},hR={x:pelvis.x+DIM.hipW,y:pelvis.y};
 const eL=seg(sL,DIM.upper,p.upperL),wL=seg(eL,DIM.fore,p.foreL),eR=seg(sR,DIM.upper,p.upperR),wR=seg(eR,DIM.fore,p.foreR);
 const kL=seg(hL,DIM.thigh,p.thighL),fL=seg(kL,DIM.shin,p.shinL),kR=seg(hR,DIM.thigh,p.thighR),fR=seg(kR,DIM.shin,p.shinR);
 return {pelvis,shoulder,head,sL,sR,hL,hR,eL,wL,eR,wR,kL,kR,fL,fR};}
function cap(A,rA,B,rB){const dx=B.x-A.x,dy=B.y-A.y,L=Math.hypot(dx,dy);
 if(L<=Math.abs(rA-rB)+0.5){const c=rA>=rB?A:B,r=Math.max(rA,rB);return `<circle cx="${c.x.toFixed(1)}" cy="${c.y.toFixed(1)}" r="${r.toFixed(1)}"/>`;}
 const ang=Math.atan2(dy,dx),phi=Math.asin((rA-rB)/L),t=Math.PI/2+phi;
 const P=(c,r,a)=>`${(c.x+r*Math.cos(a)).toFixed(1)} ${(c.y+r*Math.sin(a)).toFixed(1)}`;
 return `<path d="M ${P(A,rA,ang+t)} L ${P(B,rB,ang+t)} A ${rB} ${rB} 0 0 0 ${P(B,rB,ang-t)} L ${P(A,rA,ang-t)} A ${rA} ${rA} 0 0 0 ${P(A,rA,ang+t)} Z"/>`;}
const C=(p,r)=>`<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="${r}"/>`;
const LN=(a,b,w,c)=>`<line x1="${a.x.toFixed(1)}" y1="${a.y.toFixed(1)}" x2="${b.x.toFixed(1)}" y2="${b.y.toFixed(1)}" stroke="${c}" stroke-width="${w}" stroke-linecap="round"/>`;
const SHADOW='<ellipse cx="150" cy="314" rx="56" ry="7" fill="#c94f1e" opacity=".15"/>';
function bodyParts(J){const neckTop={x:J.head.x,y:J.head.y+DIM.head*0.55};
 const limbs=cap(J.hL,11,J.kL,8)+cap(J.kL,8,J.fL,6)+cap(J.hR,11,J.kR,8)+cap(J.kR,8,J.fR,6)
   +cap(J.sL,9,J.eL,6.5)+cap(J.eL,6.5,J.wL,5)+cap(J.sR,9,J.eR,6.5)+cap(J.eR,6.5,J.wR,5)+C(J.wL,5.5)+C(J.wR,5.5)+C(J.fL,6)+C(J.fR,6);
 const trunk=cap(J.shoulder,15,J.pelvis,15)+cap(J.sL,11,J.sR,11)+cap(J.hL,12,J.hR,12)+cap(J.shoulder,7,neckTop,7);
 return {all:limbs+trunk+C(J.head,DIM.head),head:C(J.head,DIM.head),spine:cap(J.shoulder,15,J.pelvis,15)};}
function styleLine(J){const ink='#16150f';return `${SHADOW}
 ${LN(J.hL,J.kL,11,ink)}${LN(J.kL,J.fL,11,ink)}${LN(J.hR,J.kR,11,ink)}${LN(J.kR,J.fR,11,ink)}
 ${LN(J.sL,J.eL,11,ink)}${LN(J.eL,J.wL,11,ink)}${LN(J.sR,J.eR,11,ink)}${LN(J.eR,J.wR,11,ink)}
 ${LN(J.hL,J.hR,12,ink)}${LN(J.pelvis,J.shoulder,13,ink)}${LN(J.sL,J.sR,12,ink)}
 <circle cx="${J.head.x.toFixed(1)}" cy="${J.head.y.toFixed(1)}" r="${DIM.head-1}" fill="#f2ede6" stroke="${ink}" stroke-width="6"/>`;}
function styleInk(J){const b=bodyParts(J);return `${SHADOW}
 <g fill="#16150f" stroke="#16150f" stroke-width="5.5" stroke-linejoin="round" stroke-linecap="round">${b.all}</g>
 <g fill="#23201b">${b.all}</g><g fill="#6b6055" opacity=".22">${b.spine}${b.head}</g>`;}
function styleAthlete(J){const b=bodyParts(J),midL=lerpP(J.hL,J.kL,.55),midR=lerpP(J.hR,J.kR,.55);
 const shirt=cap(J.shoulder,15,J.pelvis,13)+cap(J.sL,11,J.sR,11)+cap(J.sL,9,J.eL,6.5)+cap(J.sR,9,J.eR,6.5)+cap(J.shoulder,7,{x:J.head.x,y:J.head.y+DIM.head*.55},7);
 const shorts=cap(J.hL,12,J.hR,12)+cap(J.hL,11,midL,9)+cap(J.hR,11,midR,9);
 const eyes=C({x:J.head.x-5,y:J.head.y-3},2.1)+C({x:J.head.x+5,y:J.head.y-3},2.1);
 return `${SHADOW}
 <g fill="#3a2418" stroke="#3a2418" stroke-width="5" stroke-linejoin="round" stroke-linecap="round">${b.all}</g>
 <g fill="#dca06f">${b.all}</g><g fill="#2c2722">${shorts}</g><g fill="#c94f1e">${shirt}</g>
 <g fill="#dca06f">${b.head}${C(J.wL,5.5)}${C(J.wR,5.5)}${C(J.fL,6)}${C(J.fR,6)}</g><g fill="#2c2722">${eyes}</g>`;}
function styleSticker(J){const b=bodyParts(J);return `${SHADOW}
 <g fill="#f7f4ee" stroke="#f7f4ee" stroke-width="16" stroke-linejoin="round" stroke-linecap="round">${b.all}</g>
 <g fill="#16150f" stroke="#16150f" stroke-width="9" stroke-linejoin="round" stroke-linecap="round">${b.all}</g>
 <g fill="#e8923c">${b.all}</g><g fill="#fff" opacity=".25">${b.spine}${b.head}</g>`;}
const STYLES={D:{name:'Line',fn:styleLine},A:{name:'Ink',fn:styleInk},B:{name:'Athlete',fn:styleAthlete},C:{name:'Sticker',fn:styleSticker}};
function svgFigure(pose,style){const J=build(pose);return `<svg viewBox="0 0 300 330" xmlns="http://www.w3.org/2000/svg">${STYLES[style].fn(J)}</svg>`;}

/* ============================================================
   PROGRAM (original content)
   ============================================================ */
const POSES={
 mountain:{name:'Mountain Hold',sided:false,cue:'Feet together, tall and grounded. Settle the breath before you move.',upperL:-12,foreL:-10,upperR:12,foreR:10,thighL:-4,shinL:-4,thighR:4,shinR:4},
 grounded:{name:'Grounded Stance',sided:false,cue:'Feet planted wide, weight even. Root down through both legs and hold.',upperL:-24,foreL:-18,upperR:24,foreR:18,thighL:-20,shinL:-20,thighR:4,shinR:4},
 tree:{name:'Tree',sided:true,cue:'Foot to the inner standing leg. Lengthen up through the crown.',upperL:195,foreL:188,upperR:165,foreR:172,thighL:-50,shinL:35,thighR:3,shinR:3},
 tbalance:{name:'T-Balance',sided:true,cue:'One leg floats out to the side, arms reach wide. Stay long and level.',upperL:-110,foreL:-100,upperR:110,foreR:100,thighL:-42,shinL:-42,thighR:4,shinR:4},
 sidelift:{name:'Side Leg Lift',sided:true,cue:'Lift one leg out to the side and hold it still. Stand tall through the spine.',upperL:-28,foreL:-22,upperR:28,foreR:22,thighL:-32,shinL:-32,thighR:4,shinR:4},
 highknee:{name:'High-Knee Hold',sided:true,cue:'Drive one knee to hip height and freeze. Don’t let the hip drop.',upperL:-30,foreL:-20,upperR:30,foreR:20,thighL:-160,shinL:20,thighR:4,shinR:4},
 figure4:{name:'Figure-4 Hold',sided:true,cue:'Cross one ankle over the opposite thigh and sink. Hips square, chest lifted.',lean:4,upperL:-26,foreL:-16,upperR:26,foreR:16,thighL:-40,shinL:80,thighR:12,shinR:-6},
 eagle:{name:'Eagle Wrap',sided:true,cue:'Hug into your center — one leg wrapped, hands drawn in. Squeeze and balance.',upperL:20,foreL:185,upperR:-20,foreR:175,thighL:-26,shinL:60,thighR:8,shinR:2},
 crescent:{name:'Crescent Lean',sided:true,cue:'Reach overhead and bend gently to one side. Feel the long line from heel to hand.',lean:16,head:8,upperL:200,foreL:205,upperR:170,foreR:175,thighL:-4,shinL:-4,thighR:4,shinR:4},
 widesquat:{name:'Wide Squat Hold',sided:false,cue:'Wide stance, knees tracking out, hips low. Hold the bottom and breathe.',lean:2,upperL:186,foreL:186,upperR:174,foreR:174,thighL:-26,shinL:-6,thighR:26,shinR:6},
 toestand:{name:'Toe-Stand Reach',sided:false,cue:'Rise onto the balls of both feet and reach tall. Steady the wobble.',upperL:196,foreL:201,upperR:164,foreR:159,thighL:-2,shinL:-2,thighR:2,shinR:2},
 star:{name:'Star Reach',sided:false,cue:'Wide legs, arms to the sky — make a star and hold every line firm.',upperL:-160,foreL:-166,upperR:160,foreR:166,thighL:-22,shinL:-22,thighR:22,shinR:22},
 warrior:{name:'Warrior Reach',sided:true,cue:'Wide stance, one knee bent, arms lifting. Strong base, open chest.',upperL:198,foreL:203,upperR:162,foreR:157,thighL:-30,shinL:-30,thighR:30,shinR:8},
};
const ROTATION=['mountain','tree','grounded','sidelift','toestand','tbalance','crescent','highknee','widesquat','figure4','warrior','eagle','star'];
const SCHEDULE=Array.from({length:30},(_,i)=>ROTATION[i%ROTATION.length]);
const LEVELS={settle:{label:'Settle',sec:20},steady:{label:'Steady',sec:35},ironclad:{label:'Ironclad',sec:50}};

/* ============================================================
   STATE (localStorage)
   ============================================================ */
const LS=localStorage;
const todayStr=()=>new Date().toISOString().slice(0,10);
const yestStr =()=>new Date(Date.now()-864e5).toISOString().slice(0,10);
function getDone(){try{return JSON.parse(LS.getItem('xd_steady_done'))||[]}catch(e){return[]}}
function setDone(a){LS.setItem('xd_steady_done',JSON.stringify(a))}
function getStreak(){try{return JSON.parse(LS.getItem('xd_steady_streak'))||{count:0,last:''}}catch(e){return{count:0,last:''}}}
function setStreak(s){LS.setItem('xd_steady_streak',JSON.stringify(s))}
let level=LS.getItem('xd_steady_level'); if(!LEVELS[level]) level='settle';
let style=LS.getItem('xd_style'); if(!STYLES[style]) style='D';
function nextDay(){const d=getDone();for(let i=1;i<=30;i++)if(!d.includes(i))return i;return null;}

/* ============================================================
   VIEWS
   ============================================================ */
const $=id=>document.getElementById(id);
function showView(v){document.querySelectorAll('.view').forEach(s=>s.classList.toggle('active',s.id===v));}

function renderHome(){
  const done=getDone(), streak=getStreak();
  $('stStreak').textContent=streak.count;
  $('stDone').textContent=done.length;
  const pct=Math.round(done.length/30*100);
  $('stPct').innerHTML=pct+'<small>%</small>';
  $('barFill').style.width=pct+'%';

  // today card
  const nd=nextDay();
  if(nd===null){
    $('todayCard').innerHTML=`<div class="meta" style="grid-column:1/-1;text-align:center">
      <div class="day">Program complete</div><h2>All 30 days done 🎉</h2>
      <p>Beautifully steady. Tap any day below to revisit a hold.</p></div>`;
  } else {
    $('todayCard').innerHTML=`
      <div class="fig">${svgFigure(POSES.tree,style)}</div>
      <div class="meta">
        <div class="day">Today · Day ${nd}</div>
        <h2>Full Session</h2>
        <p>${WORKOUT.length} holds · about ${estMin()} min · ${LEVELS[level].label}. Move through the complete STEADY set, one hold at a time.</p>
        <button class="cta" style="margin-top:.8rem" onclick="startSession(${nd})">Begin Day ${nd}</button>
      </div>`;
  }

  // intensity
  $('levelSeg').innerHTML=Object.keys(LEVELS).map(k=>
    `<button class="${k===level?'on':''}" onclick="setLevel('${k}')">${LEVELS[k].label} · ${LEVELS[k].sec}s</button>`).join('');
  // figure style
  $('styleSeg').innerHTML=Object.keys(STYLES).map(k=>
    `<button class="${k===style?'on':''}" onclick="setStyle('${k}')">${STYLES[k].name}</button>`).join('');

  // grid
  $('dayGrid').innerHTML=SCHEDULE.map((pid,i)=>{
    const day=i+1, isDone=done.includes(day), isToday=day===nd;
    return `<div class="cellday ${isDone?'done':''} ${isToday?'today':''}" title="Day ${day} · Full session" onclick="startSession(${day})">${isDone?'✓':day}</div>`;
  }).join('');
}
function setLevel(k){level=k;LS.setItem('xd_steady_level',k);renderHome();}
function setStyle(k){style=k;LS.setItem('xd_style',k);renderHome();if(sess)paintSession();}

/* ============================================================
   SESSION
   ============================================================ */
let sess=null, anim=null, stageData=null;
function paint(el,pose){el.innerHTML=svgFigure(pose,style);}
function paintSession(){if(sess)paint($('sStage'),stageData||POSES[sess.steps[sess.idx].poseId]);}
// a daily session runs the whole circuit, in a deliberate flow
const WORKOUT=['mountain','grounded','toestand','tree','sidelift','highknee','tbalance','figure4','eagle','widesquat','warrior','star','crescent'];
function estMin(){const hold=LEVELS[level].sec;let s=0;WORKOUT.forEach((pid,i)=>{s+=(i===0?3:4);s+=POSES[pid].sided?hold*2:hold;});return Math.max(1,Math.round(s/60));}
function sessionPlan(){const hold=LEVELS[level].sec,steps=[];
 WORKOUT.forEach((pid,i)=>{const pose=POSES[pid],pn=i+1;
  steps.push({type:'trans',poseId:pid,poseNum:pn,label:i===0?'Get ready':'Next up',sec:i===0?3:4,flip:false});
  if(pose.sided)steps.push({type:'hold',poseId:pid,poseNum:pn,label:'Right side',sec:hold,flip:false},{type:'hold',poseId:pid,poseNum:pn,label:'Left side',sec:hold,flip:true});
  else steps.push({type:'hold',poseId:pid,poseNum:pn,label:'Hold',sec:hold,flip:false});});
 return steps;}
function lerpPose(a,b,t){const o={};for(const k in a)if(typeof a[k]==='number')o[k]=a[k]+((b[k]||0)-a[k])*t;return o;}
function animateTo(pose,then){cancelAnimationFrame(anim);const from=stageData||pose,start=performance.now(),dur=600;
 (function f(now){const t=Math.min(1,(now-start)/dur),e=t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2;
  stageData=lerpPose(from,pose,e);paint($('sStage'),stageData);
  if(t<1)anim=requestAnimationFrame(f);else if(then)then();})(start);}

function startSession(day){
  sess={day,steps:sessionPlan(),idx:0,paused:false,timer:null,remaining:0};
  stageData=null;
  $('sDay').textContent='Day '+day;
  $('sStage').classList.remove('flip');
  $('sPause').textContent='Pause';
  showView('session');
  enterStep();
}
function enterStep(){
  const st=sess.steps[sess.idx], pose=POSES[st.poseId];
  $('sName').textContent=pose.name;
  $('sCue').textContent=pose.cue;
  $('sCount').textContent='Pose '+st.poseNum+' / '+WORKOUT.length;
  $('sPhase').textContent=st.label;
  $('sStage').classList.toggle('flip',st.flip);
  sess.remaining=st.sec;
  const begin=()=>{updateTick();clearInterval(sess.timer);
    sess.timer=setInterval(()=>{if(sess.paused)return;sess.remaining--;updateTick();if(sess.remaining<=0)advance();},1000);};
  if(st.type==='trans') animateTo(pose,begin); else begin();
}
function updateTick(){
  const st=sess.steps[sess.idx];
  $('sClock').textContent=Math.max(0,sess.remaining);
  $('sProg').style.width=(Math.max(0,sess.remaining)/st.sec*100)+'%';
}
function advance(){
  clearInterval(sess.timer);
  if(sess.idx<sess.steps.length-1){sess.idx++;enterStep();}
  else finishSession();
}
function finishSession(){
  const day=sess.day; clearInterval(sess.timer); sess=null;
  const done=getDone(); if(!done.includes(day)){done.push(day);setDone(done);}
  const s=getStreak(), t=todayStr();
  if(s.last!==t){s.count=(s.last===yestStr()?s.count+1:1);s.last=t;setStreak(s);}
  const ns=getStreak();
  $('dTitle').textContent='Day '+day+' complete';
  $('dMsg').textContent=`${getDone().length} of 30 done · ${ns.count}-day streak. Nicely held.`;
  showView('done');
}
function exitSession(){if(sess){clearInterval(sess.timer);sess=null;}showView('home');renderHome();}

$('sPause').onclick=()=>{if(!sess)return;sess.paused=!sess.paused;$('sPause').textContent=sess.paused?'Resume':'Pause';$('sPhase').textContent=sess.paused?'Paused':sess.steps[sess.idx].label;};
$('sExit').onclick=exitSession;
$('dBack').onclick=()=>{showView('home');renderHome();};
$('resetLink').onclick=()=>{if(confirm('Reset all STEADY progress on this device?')){LS.removeItem('xd_steady_done');LS.removeItem('xd_steady_streak');renderHome();}};

/* init */
renderHome();
</script>
</body>
